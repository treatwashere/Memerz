    <!-- Sound Processing & Bulletproof Dragging System Logic -->
    <script>
      let activeSounds = [];

      function playSound(file) {
        const audio = new Audio(file);
        activeSounds.push(audio);
        
        audio.onended = function() {
          activeSounds = activeSounds.filter(s => s !== audio);
        };

        audio.play().catch(err => console.log("Playback error: ", err));
      }

      function stopAllSounds() {
        activeSounds.forEach(sound => {
          sound.pause();
          sound.currentTime = 0;
        });
        activeSounds = [];
      }

      /* --- FIXED FLUID TRANSFORMS DRAG LOGIC --- */
      const toolbar = document.getElementById('floating-toolbar');
      let isDragging = false;
      let gestureMoved = false;
      
      let startX = 0, startY = 0;         // Starting positions relative to viewport
      let transformX = 0, transformY = 0; // Stored layout transform coordinates
      let dragStartX = 0, dragStartY = 0; // Detect precise click vs drag delta shifts

      // Universal pointer tracker handles Mouse + Touch seamlessly
      toolbar.addEventListener('pointerdown', (e) => {
        isDragging = true;
        gestureMoved = false;
        
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        
        startX = e.clientX - transformX;
        startY = e.clientY - transformY;
        
        toolbar.setPointerCapture(e.pointerId);
        toolbar.style.transition = 'none'; // Lock animations while finger/mouse moves
      });

      toolbar.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        
        // Track absolute drag distance travel path
        const totalDistance = Math.sqrt(Math.pow(e.clientX - dragStartX, 2) + Math.pow(e.clientY - dragStartY, 2));
        if (totalDistance > 5) {
          gestureMoved = true;
        }
        
        transformX = e.clientX - startX;
        transformY = e.clientY - startY;
        
        // Update hardware accelerated positions cleanly
        toolbar.style.transform = `translate(${transformX}px, ${transformY}px)`;
      });

      toolbar.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        toolbar.releasePointerCapture(e.pointerId);
        
        // Re-inject smooth interactions upon drag release
        toolbar.style.transition = 'transform 0.1s ease, border-color 0.2s';
        
        // Only run action if the user intended a quick click, not a moving drag sequence
        if (!gestureMoved) {
          stopAllSounds();
        }
      });
    </script>
