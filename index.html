<button onclick="stopAllSounds()" style="background-color: #ff4c4c; color: white;">
  🛑 STOP ALL SOUNDS
</button>

<script>
  // This array keeps track of all sounds currently playing
  let activeSounds = [];

  function playSound(file) {
    const audio = new Audio(file);
    
    // Add this sound to our tracking list
    activeSounds.push(audio);
    
    // When the sound finishes, remove it from the list to save memory
    audio.onended = function() {
      activeSounds = activeSounds.filter(s => s !== audio);
    };

    audio.play();
  }

  function stopAllSounds() {
    // Loop through every sound in our list and stop it
    activeSounds.forEach(sound => {
      sound.pause();
      sound.currentTime = 0; // Reset to the beginning
    });

    // Clear the array since everything is stopped
    activeSounds = [];
  }
</script>
